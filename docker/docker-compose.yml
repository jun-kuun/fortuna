services:
  postgres:
    image: postgres:15-alpine
    container_name: fortuna-postgres
    environment:
      POSTGRES_USER: fortuna
      POSTGRES_PASSWORD: fortuna_secret
      POSTGRES_DB: fortuna_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortuna -d fortuna_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
